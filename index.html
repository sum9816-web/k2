<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>통분 연습 퀴즈 (소스 문제 반영)</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; padding-top: 50px; }
        .quiz-container { background: white; width: 450px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border: 2px solid #3498db; }
        h2 { color: #2c3e50; margin-bottom: 5px; }
        .progress { color: #95a5a6; font-size: 0.9em; margin-bottom: 20px; }
        .question-box { background: #ebf5fb; padding: 20px; border-radius: 12px; font-size: 1.8em; font-weight: bold; margin-bottom: 25px; color: #2980b9; }
        .input-row { display: flex; align-items: center; justify-content: center; margin: 15px 0; font-size: 1.2em; }
        input { width: 70px; height: 40px; text-align: center; font-size: 1.1em; border: 2px solid #bdc3c7; border-radius: 8px; margin: 0 10px; }
        input:focus { border-color: #3498db; outline: none; }
        .lcm-val { color: #e67e22; font-weight: bold; width: 70px; display: inline-block; }
        #check-btn { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 10px; font-size: 1.1em; cursor: pointer; transition: 0.2s; }
        #check-btn:hover { background: #2980b9; }
        #next-btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 10px; font-size: 1.1em; cursor: pointer; display: none; }
        #result-msg { margin-top: 20px; font-weight: bold; min-height: 40px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>🔢 통분 퀴즈</h2>
    <div class="progress" id="progress">문제 1 / 10</div>
    
    <div class="question-box" id="question">로딩 중...</div>
    
    <div class="input-row">
        <span id="frac1"></span> → <input type="number" id="user-a1"> / <span class="lcm-val" id="lcm1"></span>
    </div>
    <div class="input-row">
        <span id="frac2"></span> → <input type="number" id="user-a2"> / <span class="lcm-val" id="lcm2"></span>
    </div>

    <div id="result-msg"></div>
    
    <button id="check-btn" onclick="checkAnswer()">정답 확인</button>
    <button id="next-btn" onclick="nextQuestion()">참 잘했습니다! 다음 문제 ▶</button>
</div>

<script>
    // 소스(빈 문서 1.pdf)에서 추출한 10개의 문제 데이터 [1]
    const quizData = [
        {n1: 1, n2: 2, d1: 2, d2: 7},
        {n1: 3, n2: 1, d1: 10, d2: 6},
        {n1: 4, n2: 2, d1: 5, d2: 3},
        {n1: 4, n2: 5, d1: 9, d2: 6},
        {n1: 5, n2: 3, d1: 8, d2: 5},
        {n1: 1, n2: 2, d1: 4, d2: 3},
        {n1: 1, n2: 3, d1: 4, d2: 8},
        {n1: 2, n2: 5, d1: 3, d2: 6},
        {n1: 4, n2: 2, d1: 7, d2: 11},
        {n1: 5, n2: 4, d1: 9, d2: 15}
    ];

    let currentIdx = 0;
    let targetLcm, correctA1, correctA2;

    function gcd(a, b) { return b ? gcd(b, a % b) : a; }
    function lcm(a, b) { return (a * b) / gcd(a, b); }

    function loadQuestion() {
        const q = quizData[currentIdx];
        targetLcm = lcm(q.d1, q.d2);
        correctA1 = q.n1 * (targetLcm / q.d1);
        correctA2 = q.n2 * (targetLcm / q.d2);

        document.getElementById('progress').innerText = `문제 ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('question').innerText = `${q.n1}/${q.d1} 와 ${q.n2}/${q.d2}`;
        document.getElementById('frac1').innerText = `${q.n1}/${q.d1}`;
        document.getElementById('frac2').innerText = `${q.n2}/${q.d2}`;
        document.getElementById('lcm1').innerText = targetLcm;
        document.getElementById('lcm2').innerText = targetLcm;

        // UI 초기화
        document.getElementById('user-a1').value = '';
        document.getElementById('user-a2').value = '';
        document.getElementById('user-a1').disabled = false;
        document.getElementById('user-a2').disabled = false;
        document.getElementById('result-msg').innerText = '';
        document.getElementById('check-btn').style.display = 'block';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAnswer() {
        const ua1 = parseInt(document.getElementById('user-a1').value);
        const ua2 = parseInt(document.getElementById('user-a2').value);
        const msg = document.getElementById('result-msg');

        if (ua1 === correctA1 && ua2 === correctA2) {
            msg.innerHTML = "<span style='color: #27ae60;'>정답입니다!</span>";
            document.getElementById('user-a1').disabled = true;
            document.getElementById('user-a2').disabled = true;
            document.getElementById('check-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
        } else {
            msg.innerHTML = "<span style='color: #e74c3c;'>다시 한번 계산해 보세요.</span>";
        }
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizData.length) {
            loadQuestion();
        } else {
            document.querySelector('.quiz-container').innerHTML = "<h2>🎉 축하합니다!</h2><p>소스의 모든 문제를 마스터하셨습니다.</p><button onclick='location.reload()' style='width:100%; padding:15px; background:#34495e; color:white; border:none; border-radius:10px; cursor:pointer;'>다시 시작하기</button>";
        }
    }

    loadQuestion();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>단계별 통분 마스터 (상세 과정)</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .quiz-card { background: white; width: 700px; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid #3498db; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        /* 세로 분수 스타일 */
        .fraction-ui { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; }
        .num-box { border-bottom: 2px solid #333; padding: 5px; min-width: 50px; text-align: center; font-weight: bold; }
        .den-box { padding: 5px; min-width: 50px; text-align: center; font-weight: bold; }
        
        .q-display { font-size: 2em; font-weight: bold; margin: 25px 0; background: #ebf5fb; padding: 20px; border-radius: 15px; display: flex; justify-content: center; align-items: center; gap: 20px; }
        
        .step { background: #ffffff; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ddd; display: none; }
        .step.active { display: block; border-left: 8px solid #3498db; }
        .step.completed { display: block; border-left: 8px solid #bdc3c7; background: #f9f9f9; opacity: 0.7; }
        .step-title { font-weight: bold; display: block; margin-bottom: 15px; color: #2980b9; font-size: 1.1em; }
        
        .math-row { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.2em; font-weight: bold; }
        input { width: 60px; height: 32px; text-align: center; font-size: 1em; border: 2px solid #ccc; border-radius: 6px; }
        input:focus { border-color: #3498db; outline: none; }
        
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-check { background: #3498db; color: white; margin-top: 10px; }
        .btn-next { background: #27ae60; color: white; width: 100%; font-size: 1.3em; display: none; margin-top: 20px; padding: 15px; }
        
        #msg { margin-top: 15px; font-weight: bold; text-align: center; color: #e74c3c; min-height: 24px; }
        .highlight { color: #e67e22; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="header">
        <h2 style="margin:0; color:#2c3e50;">📏 통분 단계별 학습 (상세)</h2>
        <span id="progress" style="font-weight:bold; color:#7f8c8d;">문제 1 / 10</span>
    </div>

    <!-- 원본 문제 -->
    <div class="q-display">
        <div class="fraction-ui"><div class="num-box" id="q-n1"></div><div class="den-box" id="q-d1"></div></div>
        <span>와</span>
        <div class="fraction-ui"><div class="num-box" id="q-n2"></div><div class="den-box" id="q-d2"></div></div>
    </div>

    <!-- 1단계: 최소공배수 -->
    <div id="step1" class="step active">
        <span class="step-title">1단계: 두 분모의 최소공배수를 구하세요.</span>
        <div class="math-row">최소공배수 = <input type="number" id="ans-lcm"></div>
        <button class="btn-check" onclick="checkStep1()">확인</button>
    </div>

    <!-- 2단계: 첫 번째 분모 변환 -->
    <div id="step2" class="step">
        <span class="step-title">2단계: 첫 번째 분모에 얼마를 곱해야 최소공배수가 될까요?</span>
        <div class="math-row">
            분모 <span id="s2-d1" class="highlight"></span> × <input type="number" id="ans-m1"> = <span class="disp-lcm highlight"></span>
        </div>
        <button class="btn-check" onclick="checkStep2()">확인</button>
    </div>

    <!-- 3단계: 첫 번째 분자 변환 (요청 사항 반영) -->
    <div id="step3" class="step">
        <span class="step-title">3단계: 분모와 똑같이, 분자에도 얼마를 곱해야 할까요?</span>
        <div class="math-row">
            <div class="fraction-ui">
                <div class="num-box"><span id="s3-n1"></span> × <input type="number" id="ans-m1-n" placeholder="곱할수"></div>
                <div class="den-box" id="s3-d1-full"></div>
            </div>
            <span>=</span>
            <div class="fraction-ui">
                <div class="num-box"><input type="number" id="ans-fn1" placeholder="결과"></div>
                <div class="den-box" id="s3-lcm-disp"></div>
            </div>
        </div>
        <button class="btn-check" onclick="checkStep3()">확인</button>
    </div>

    <!-- 4단계: 두 번째 분모 변환 -->
    <div id="step4" class="step">
        <span class="step-title">4단계: 두 번째 분모에 얼마를 곱해야 최소공배수가 될까요?</span>
        <div class="math-row">
            분모 <span id="s4-d2" class="highlight"></span> × <input type="number" id="ans-m2"> = <span class="disp-lcm highlight"></span>
        </div>
        <button class="btn-check" onclick="checkStep4()">확인</button>
    </div>

    <!-- 5단계: 두 번째 분자 변환 (요청 사항 반영) -->
    <div id="step5" class="step">
        <span class="step-title">5단계: 분모와 똑같이, 분자에도 얼마를 곱해야 할까요?</span>
        <div class="math-row">
            <div class="fraction-ui">
                <div class="num-box"><span id="s5-n2"></span> × <input type="number" id="ans-m2-n" placeholder="곱할수"></div>
                <div class="den-box" id="s5-d2-full"></div>
            </div>
            <span>=</span>
            <div class="fraction-ui">
                <div class="num-box"><input type="number" id="ans-fn2" placeholder="결과"></div>
                <div class="den-box" id="s5-lcm-disp"></div>
            </div>
        </div>
        <button class="btn-check" onclick="checkStep5()">확인</button>
    </div>

    <!-- 6단계: 결과 -->
    <div id="step6" class="step">
        <span class="step-title">6단계: 통분 결과가 완성되었습니다.</span>
        <div class="math-row">
            <div class="fraction-ui"><div class="num-box" id="f-n1"></div><div class="den-box" id="f-d1"></div></div>
            <span>,</span>
            <div class="fraction-ui"><div class="num-box" id="f-n2"></div><div class="den-box" id="f-d2"></div></div>
        </div>
        <button class="btn-check" onclick="checkStep6()" style="width:100%;">통분 완료!</button>
    </div>

    <div id="msg"></div>
    <button id="next-btn" class="btn-next" onclick="loadNextQuestion()">다음 문제로 이동 ▶</button>
</div>

<script>
    const quizData = [
        {n1: 1, d1: 2, n2: 2, d2: 7}, {n1: 3, d1: 10, n2: 1, d2: 6},
        {n1: 4, d1: 5, n2: 2, d2: 3}, {n1: 4, d1: 9, n2: 5, d2: 6},
        {n1: 5, d1: 8, n2: 3, d2: 5}, {n1: 1, d1: 4, n2: 2, d2: 3},
        {n1: 1, d1: 4, n2: 3, d2: 8}, {n1: 2, d1: 3, n2: 5, d2: 6},
        {n1: 4, d1: 7, n2: 2, d2: 11}, {n1: 5, d1: 9, n2: 4, d2: 15}
    ];

    let currentIdx = 0;
    let info = {};

    function gcd(a, b) { return b ? gcd(b, a % b) : a; }
    function lcm(a, b) { return (a * b) / gcd(a, b); }

    function initQuestion() {
        const q = quizData[currentIdx];
        const targetLcm = lcm(q.d1, q.d2);
        info = { ...q, lcm: targetLcm, m1: targetLcm / q.d1, m2: targetLcm / q.d2, 
                 fn1: q.n1 * (targetLcm / q.d1), fn2: q.n2 * (targetLcm / q.d2) };

        document.getElementById('progress').innerText = `문제 ${currentIdx + 1} / 10`;
        document.getElementById('q-n1').innerText = q.n1; document.getElementById('q-d1').innerText = q.d1;
        document.getElementById('q-n2').innerText = q.n2; document.getElementById('q-d2').innerText = q.d2;
        document.querySelectorAll('.disp-lcm').forEach(el => el.innerText = targetLcm);
        
        document.getElementById('s2-d1').innerText = q.d1;
        document.getElementById('s3-n1').innerText = q.n1;
        document.getElementById('s3-d1-full').innerText = `${q.d1} × ${info.m1}`;
        document.getElementById('s3-lcm-disp').innerText = targetLcm;
        
        document.getElementById('s4-d2').innerText = q.d2;
        document.getElementById('s5-n2').innerText = q.n2;
        document.getElementById('s5-d2-full').innerText = `${q.d2} × ${info.m2}`;
        document.getElementById('s5-lcm-disp').innerText = targetLcm;

        for(let i=1; i<=6; i++) {
            const el = document.getElementById('step'+i);
            el.className = (i === 1) ? "step active" : "step";
            el.querySelectorAll('input').forEach(inp => { inp.value = ''; inp.disabled = false; });
            el.querySelectorAll('button').forEach(btn => btn.style.display = 'inline-block');
        }
        document.getElementById('msg').innerText = '';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkStep1() {
        if (parseInt(document.getElementById('ans-lcm').value) === info.lcm) 
            successStep(1, 2, "맞았습니다! 최소공배수는 " + info.lcm + "입니다.");
        else errorMsg("최소공배수를 다시 계산해 보세요.");
    }

    function checkStep2() {
        if (parseInt(document.getElementById('ans-m1').value) === info.m1) 
            successStep(2, 3, "좋아요! 분모에 " + info.m1 + "을 곱했네요.");
        else errorMsg("분모에 곱할 수가 틀렸습니다.");
    }

    function checkStep3() {
        const um1 = parseInt(document.getElementById('ans-m1-n').value);
        const ufn1 = parseInt(document.getElementById('ans-fn1').value);
        if (um1 === info.m1 && ufn1 === info.fn1) 
            successStep(3, 4, "정확합니다! 분자에도 똑같이 " + info.m1 + "을 곱해 " + info.fn1 + "이 되었습니다.");
        else errorMsg("곱할 수 또는 계산 결과가 틀렸습니다.");
    }

    function checkStep4() {
        if (parseInt(document.getElementById('ans-m2').value) === info.m2) 
            successStep(4, 5, "잘하셨습니다! 두 번째 분모에는 " + info.m2 + "를 곱합니다.");
        else errorMsg("분모에 곱할 수가 틀렸습니다.");
    }

    function checkStep5() {
        const um2 = parseInt(document.getElementById('ans-m2-n').value);
        const ufn2 = parseInt(document.getElementById('ans-fn2').value);
        if (um2 === info.m2 && ufn2 === info.fn2) {
            document.getElementById('f-n1').innerText = info.fn1; document.getElementById('f-d1').innerText = info.lcm;
            document.getElementById('f-n2').innerText = info.fn2; document.getElementById('f-d2').innerText = info.lcm;
            successStep(5, 6, "완벽해요! 분자에도 똑같이 " + info.m2 + "를 곱해 " + info.fn2 + "이 되었습니다.");
        } else errorMsg("곱할 수 또는 계산 결과가 틀렸습니다.");
    }

    function checkStep6() {
        document.getElementById('step6').className = "step completed";
        document.getElementById('step6').querySelector('button').style.display = 'none';
        document.getElementById('msg').innerHTML = "<span style='color:#27ae60;'>통분 성공! 모든 과정을 마스터하셨습니다.</span>";
        document.getElementById('next-btn').style.display = 'block';
    }

    function successStep(curr, next, msg) {
        const cEl = document.getElementById('step'+curr);
        cEl.className = "step completed";
        cEl.querySelectorAll('input').forEach(i => i.disabled = true);
        cEl.querySelector('button').style.display = 'none';
        document.getElementById('step'+next).className = "step active";
        document.getElementById('msg').innerHTML = `<span style='color:#27ae60;'>${msg}</span>`;
    }

    function errorMsg(t) { document.getElementById('msg').innerText = t; }

    function loadNextQuestion() {
        currentIdx++;
        if (currentIdx < quizData.length) initQuestion();
        else {
            document.querySelector('.quiz-card').innerHTML = "<h1>🏆 통분 박사 탄생!</h1><p>모든 과정을 완벽하게 통과하셨습니다.</p><button onclick='location.reload()' style='padding:15px; background:#2c3e50; color:white; border:none; border-radius:10px; cursor:pointer;'>다시 시작하기</button>";
        }
    }

    initQuestion();
</script>

</body>
</html>
